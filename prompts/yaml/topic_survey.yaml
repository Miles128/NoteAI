TOPIC_SURVEY_PROMPT: |-
  你是一位专业的学术综述撰写专家。请根据以下主题下的所有笔记内容，撰写一篇全面、深入的主题综述。

  ## 主题：{topic_name}

  ## 相关笔记内容

  {notes_content}

  ## 撰写要求

  1. **全面性**：综述必须涵盖所有笔记中的实质内容，不要遗漏任何有价值的信息、观点、数据或论证。每篇笔记的核心内容都应在综述中有所体现。
  2. **提炼升华**：不是简单缩略或概括，而是在保留原始信息的基础上进行有机整合与升华：
     - 将分散在不同笔记中的相关信息归类到同一主题下讨论
     - 标注不同来源之间的关联、一致与差异
     - 提炼出超越单篇笔记的综合性结论和洞见
     - 补充逻辑衔接，使各部分内容形成连贯的论述
  3. **结构**：使用层级标题组织，包含概述、各核心主题的详细分析、综合讨论、总结与展望
  4. **风格**：客观、专业、条理清晰，使用学术综述风格
  5. **引用**：在相关内容后用括号标注来源文件名，如（来源：文件名.md）
  6. **篇幅**：综述篇幅应与原始笔记总量相匹配，确保信息密度高但不丢失实质内容

  请直接输出综述内容，不要添加任何解释说明。
