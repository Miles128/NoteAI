<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteAI</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/tree.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/preview.css">
    <link rel="stylesheet" href="css/cloud-sync.css">
    <link rel="stylesheet" href="css/ingest.css">
    <link rel="stylesheet" href="css/schema-wizard.css">
    <link rel="stylesheet" href="css/inspector.css">

    <script src="d3.min.js"></script>
    <script src="marked.min.js"></script>
    <script src="purify.min.js"></script>

    <link rel="stylesheet" href="hljs-github.css" id="hljs-light">
    <link rel="stylesheet" href="hljs-github-dark.css" id="hljs-dark" disabled>
    <script src="highlight.min.js"></script>

    <script src="pdfjs-legacy.min.js"></script>
    <!-- 须在 main.mjs 之前加载，否则打开笔记时会落入纯文本/静态预览简易模式 -->
    <script src="lib/tiptap-bundle.js"></script>

    <script type="module" src="js/main.mjs"></script>
</head>
<body>
    <!-- 早于模块脚本：避免首屏 HTML onclick 产生 ReferenceError（utils.js 会补充更多占位） -->
    <script>window.toggleSidebar = window.toggleSidebar || function(){};window.openWorkspace = window.openWorkspace || function(){};window.showSettings = window.showSettings || function(){};</script>
    <div id="app-scale-root">
    <div class="custom-titlebar" data-tauri-drag-region>
        <div class="titlebar-left" data-tauri-drag-region>
            <button class="titlebar-btn tab-btn" onclick="switchTab(0)" data-tab="web" data-i18n-title="titlebar.webDownload">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="8 10 12 14 16 10"></polyline>
                    <path d="M12 14V3"></path>
                </svg>
            </button>
            <button class="titlebar-btn tab-btn" onclick="importFiles()" data-tab="file" data-i18n-title="titlebar.importFiles">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    <line x1="12" y1="11" x2="12" y2="17"></line>
                    <polyline points="9 14 12 17 15 14"></polyline>
                </svg>
            </button>
            <button class="titlebar-btn titlebar-toggle-btn" id="titlebar-toggle-sidebar" onclick="toggleSidebar()" data-i18n-title="titlebar.toggleFolderSidebar" data-i18n-aria="titlebar.toggleFolderSidebar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="18" y2="11"></line>
                    <line x1="14" y1="15" x2="18" y2="15"></line>
                </svg>
            </button>
            <button class="titlebar-btn titlebar-toggle-btn" id="titlebar-toggle-note-list" onclick="toggleNoteList()" data-i18n-title="titlebar.toggleNoteList" data-i18n-aria="titlebar.toggleNoteList">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 6h13"></path>
                    <path d="M8 12h13"></path>
                    <path d="M8 18h13"></path>
                    <path d="M3 6h.01"></path>
                    <path d="M3 12h.01"></path>
                    <path d="M3 18h.01"></path>
                </svg>
            </button>
            </div>
        <div class="titlebar-center" data-tauri-drag-region>
            <div class="titlebar-file-name-wrapper">
                <div class="titlebar-file-name" id="titlebar-file-name"></div>
                <button class="titlebar-btn titlebar-close-preview" id="titlebar-close-preview-btn" onclick="closePreviewPanel()" data-i18n-title="titlebar.closePreview" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"></path>
                        <path d="m6 6 12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div class="titlebar-right">
            <button class="titlebar-btn" id="titlebar-pending-btn" onclick="togglePendingView()" data-i18n-title="titlebar.pending">
                <svg class="pending-icon-normal" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <svg class="pending-icon-alert" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span class="pending-badge" style="display:none;"></span>
            </button>
            <button class="titlebar-btn" id="titlebar-split-btn" onclick="toggleEditMode()" data-i18n-title="titlebar.edit" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path>
                    <path d="m15 5 4 4"></path>
                </svg>
            </button>
            <button class="titlebar-btn" id="titlebar-graph-btn" onclick="toggleGraphPanel()" data-i18n-title="titlebar.relationGraph">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="2"></circle>
                    <circle cx="4" cy="6" r="2"></circle>
                    <circle cx="20" cy="6" r="2"></circle>
                    <circle cx="4" cy="18" r="2"></circle>
                    <circle cx="20" cy="18" r="2"></circle>
                    <line x1="12" y1="10" x2="5.5" y2="7.5"></line>
                    <line x1="12" y1="10" x2="18.5" y2="7.5"></line>
                    <line x1="12" y1="14" x2="5.5" y2="16.5"></line>
                    <line x1="12" y1="14" x2="18.5" y2="16.5"></line>
                </svg>
            </button>
            <button class="titlebar-btn" id="titlebar-search-btn" onclick="toggleSearchModal()" data-i18n-title="titlebar.search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="titlebar-btn" onclick="showSettings()" data-i18n-title="titlebar.settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43-.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
            <button class="titlebar-btn ai-panel-toggle-btn" id="titlebar-ai-toggle-btn" onclick="toggleAIPanel()" data-i18n-title="titlebar.aiAssistant" aria-pressed="false" aria-label="AI assistant sidebar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="15" y1="3" x2="15" y2="21"></line>
                </svg>
            </button>
        </div>
    </div>
    <div class="app-container">
        <button class="sidebar-expand-btn" id="sidebar-expand-btn" onclick="toggleSidebar()" data-i18n-title="titlebar.expandSidebar" style="display: none;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
        <div class="sidebar sidebar-left" id="sidebar">
            <div class="sidebar-workspace-header">
                <button type="button" class="sidebar-workspace-switch-btn" onclick="openWorkspace()" data-i18n-title="titlebar.openWorkspace" data-i18n-aria="titlebar.openWorkspace">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="m20 20-2-2V8l-4-4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2l2 2Z"></path>
                        <path d="M7 9h10"></path>
                        <path d="M7 13h6"></path>
                    </svg>
                </button>
                <span class="sidebar-workspace-name is-empty" id="workspace-name-display"></span>
            </div>
            <div class="sidebar-main" id="sidebar-main">
                <div class="sidebar-pane is-active" id="sidebar-pane-tree" data-sidebar-pane="tree">
                    <div class="file-tree-container" id="file-tree">
                        <div class="tree-empty" data-i18n="common.noWorkspace"></div>
                    </div>
                </div>
                <div class="sidebar-pane" id="sidebar-pane-tags" data-sidebar-pane="tags" hidden>
                    <div class="sidebar-view-container" id="sidebar-tags"></div>
                    <div class="sidebar-tag-input" id="sidebar-tag-input" style="display: none;">
                        <input type="text" class="topic-input" id="tag-input-field" data-i18n-placeholder="sidebar.tagPlaceholder">
                        <button class="topic-input-btn topic-input-cancel" id="tag-input-cancel" data-i18n-title="common.cancel">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                        <button class="topic-input-btn topic-input-confirm" id="tag-input-confirm" data-i18n-title="sidebar.confirmCreateTag">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </button>
                    </div>
                </div>
                <div class="sidebar-pane" id="sidebar-pane-graph" data-sidebar-pane="graph" hidden>
                    <div class="sidebar-view-container" id="sidebar-graph"></div>
                </div>
            </div>
        </div>

        <div class="resizer" id="sidebar-resizer"></div>

        <div class="note-list-panel" id="note-list-panel">
            <div class="note-list-header">
                <span class="note-list-title" id="note-list-title" data-i18n="noteList.title"></span>
                <span class="note-list-count" id="note-list-count">0</span>
            </div>
            <div class="note-list-body" id="note-list-body">
                <div class="note-list-empty" data-i18n="noteList.empty"></div>
            </div>
        </div>

        <div class="resizer" id="note-list-resizer"></div>

        <div class="right-area" id="right-area">
            <div class="content-panel" id="content-panel">
                <div class="pending-view" id="pending-view" style="display:none;">
                    <div class="pending-view-header">
                        <h2 data-i18n="pending.title"></h2>
                        <span class="pending-view-count" id="pending-view-count" data-i18n="common.pendingCount" data-i18n-count="0"></span>
                        <div class="pending-header-actions">
                            <button type="button" class="pending-header-btn" id="pending-lint-run-btn" data-i18n="pending.healthCheck" data-i18n-title="pending.healthCheck"></button>
                            <button type="button" class="pending-header-btn" id="pending-cascade-retry-all-btn" data-i18n="pending.retryAllSurveys" data-i18n-title="pending.retryAllSurveys"></button>
                        </div>
                    </div>
                    <p class="pending-view-hint" data-i18n="pending.hint"></p>
                    <div class="pending-view-sections">
                        <div class="pending-section">
                            <div class="pending-view-list" id="pending-view-list">
                                <div class="pending-view-empty" data-i18n="pending.empty"></div>
                            </div>
                        </div>
                        <div class="pending-section" id="pending-cascade-section" style="display:none;" hidden>
                            <div class="pending-cascade-list" id="pending-cascade-list"></div>
                            <span class="pending-cascade-count" id="pending-cascade-count" hidden></span>
                        </div>
                    </div>
                </div>
                <div class="content-area" id="content-area">
                    <div class="tab-content active" id="tab-0">
                    </div>

                    <div class="tab-content" id="tab-1">
                        <div class="card">
                            <div class="card-title" data-i18n="integrator.cardTitle"></div>
                            <div class="ai-status-box">
                                <span class="status-dot"></span>
                                <span class="status-text" data-i18n="integrator.statusLine"></span>
                            </div>
                        </div>

                        <div class="card" id="topic-card">
                            <div class="card-title" data-i18n="integrator.topicSettings"></div>
                            <div class="form-group form-row">
                                <div class="form-row-item">
                                    <div class="form-label" data-i18n="integrator.topicCount"></div>
                                    <input type="number" id="topic-count" class="form-input form-input-full" data-i18n-placeholder="integrator.topicCountPlaceholder" min="2">
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-label" data-i18n="integrator.topicListHint"></div>
                                <textarea id="topic-list" class="form-input form-textarea" data-i18n-placeholder="integrator.topicListPlaceholder" oninput="updateIntegrateBtnState()"></textarea>
                            </div>
                            <div class="btn-group btn-group-spacing">
                                <button class="btn btn-secondary btn-flex" id="extract-topics-btn" onclick="extractTopics()" data-i18n-title="integrator.extractTopicsHint" data-i18n="integrator.extractTopics"></button>
                                <button class="btn btn-primary btn-flex" id="integrate-btn" onclick="startNoteIntegration()" disabled data-i18n-title="integrator.startHint" data-i18n="integrator.start"></button>
                            </div>
                        </div>

                        <div class="integration-hint" id="integration-hint"></div>

                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" id="integration-progress-fill"></div>
                            </div>
                            <div class="progress-text" id="integration-status"></div>
                        </div>
                    </div>
                </div>
                <div class="graph-panel" id="graph-panel" style="display: none;">
                    <div class="graph-panel-header">
                        <div class="graph-stats-bar">
                            <span class="graph-stat-chip"><span id="graph-stat-notes">0</span><span data-i18n="graph.stats.notesSuffix"></span></span>
                            <span class="graph-stats-sep" aria-hidden="true">·</span>
                            <span class="graph-stat-chip"><span id="graph-stat-topics">0</span><span data-i18n="graph.stats.topicsSuffix"></span></span>
                        </div>
                        <div class="graph-header-controls">
                            <div class="graph-filter-bar" id="graph-filter-bar">
                                <button class="graph-filter-btn active" data-filter="topic" data-i18n="graph.filter.topic" data-i18n-title="graph.filter.topic"></button>
                                <button class="graph-filter-btn" data-filter="tag" data-i18n="graph.filter.tag" data-i18n-title="graph.filter.tag"></button>
                                <button class="graph-filter-btn" data-filter="all" data-i18n="graph.filter.all" data-i18n-title="graph.filter.all"></button>
                            </div>
                            <div class="graph-toolbar">
                                <button class="graph-toolbar-btn" id="graph-toggle-filenames" onclick="graphToggleFilenames()" data-i18n-title="graph.toggleFilenames">
                                    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                                </button>
                                <button class="graph-toolbar-btn" onclick="graphReplay()" data-i18n-title="graph.replay">
                                    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                </button>
                                <button class="graph-toolbar-btn" onclick="loadRelationGraphData()" data-i18n-title="graph.refresh">
                                    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                                </button>
                                <button class="graph-toolbar-btn" id="graph-layout-settings-btn" onclick="graphOpenLayoutSettings()" data-i18n-title="graph.layoutSettings">
                                    <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="graph-panel-main">
                        <div class="graph-panel-body" id="graph-panel-body">
                            <div class="graph-loading" id="graph-loading" style="display:none;" data-i18n="graph.loading"></div>
                            <div class="graph-empty" id="graph-empty" style="display:none;" data-i18n="graph.empty"></div>
                        </div>
                        <div class="graph-legend-float" id="graph-legend" aria-label="Legend"></div>
                        <aside id="graph-settings-sidebar" class="graph-settings-sidebar" hidden aria-labelledby="graph-settings-title">
                            <div class="graph-settings-header">
                                <h3 id="graph-settings-title" data-i18n="graph.layoutSettings"></h3>
                                <button type="button" class="graph-panel-close" onclick="graphCloseLayoutSettings()" data-i18n-title="common.collapse">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                </button>
                            </div>
                            <div class="graph-settings-scroll" id="graph-settings-form"></div>
                            <div class="graph-settings-footer">
                                <button type="button" class="graph-settings-btn" onclick="graphResetLayoutSettings()" data-i18n="common.resetDefault"></button>
                                <button type="button" class="graph-settings-btn graph-settings-btn-primary" onclick="graphApplyLayoutSettings()" data-i18n="common.apply"></button>
                            </div>
                        </aside>
                    </div>
                </div>

            <div class="topic-pending-panel" id="topic-pending-panel" style="display: none;"></div>
            <div class="topic-files-panel" id="topic-files-panel" style="display: none;"></div>

            <div class="pending-links-panel" id="pending-links-panel" style="display: none;">
                <div class="pending-links-header">
                    <span class="pending-links-title" data-i18n="links.pendingTitle"></span>
                    <button class="pending-links-confirm-all" onclick="onConfirmAllLinks()" data-i18n-title="links.confirmAll" data-i18n="links.confirmAllBtn"></button>
                    <button class="graph-panel-close" onclick="togglePendingLinksPanel()" data-i18n-title="common.close">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="pending-links-body" id="pending-links-body">
                    <div class="pending-links-empty" id="pending-links-empty" data-i18n="links.pendingEmpty"></div>
                    <div class="pending-links-list" id="pending-links-list"></div>
                </div>
            </div>

            <div class="ai-suggestion-panel" id="ai-suggestion-panel" style="display: none;"></div>

            </div>

            <div class="preview-panel" id="preview-panel" style="display: none;">
                <div class="preview-resizer" id="preview-resizer"></div>
                <div class="preview-content-wrapper">
                    <div class="preview-content" id="preview-content">
                        <div class="preview-empty" id="preview-empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            <div data-i18n="preview.selectFile"></div>
                        </div>
                    </div>

                    <div class="tiptap-editor-container" id="tiptap-editor-container" style="display: none;">
                        <div class="tiptap-toolbar" id="tiptap-toolbar" style="display: none;">
                            <button class="tiptap-btn" data-action="bold" data-i18n-title="editor.bold">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                                    <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                                </svg>

            <div class="modal-body">
                <p class="modal-desc" data-i18n="projectRules.desc"></p>
                <textarea id="project-rules-input" class="form-input form-textarea" rows="12" data-i18n-placeholder="projectRules.placeholder" placeholder="## 项目规则&#10;&#10;- 本项目是关于 XXX 的知识库&#10;- 所有笔记使用中文&#10;- 代码示例使用 Python&#10;- 优先使用简洁的技术文档风格"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeProjectRulesModal()" data-i18n="common.skip"></button>
                <button class="btn btn-primary" onclick="saveProjectRulesModal()" data-i18n="projectRules.save"></button>
            </div>
        </div>
    </div>

    <div id="quick-create-overlay" class="quick-create-overlay" style="display:none">
        <div class="quick-create-dialog" role="dialog" aria-labelledby="quick-create-title">
            <div class="quick-create-header">
                <span id="quick-create-title" data-i18n="quickCreate.title"></span>
                <button type="button" class="quick-create-close" onclick="QuickCreateModule.close()" data-i18n-title="common.close">&times;</button>
            </div>
            <div class="quick-create-tabs">
                <button type="button" class="qc-tab active" data-qc-tab="note" data-i18n="quickCreate.tabNote"></button>
                <button type="button" class="qc-tab" data-qc-tab="topic" data-i18n="quickCreate.tabTopic"></button>
            </div>
            <div class="qc-pane" data-qc-pane="note">
                <label class="qc-label" data-i18n="quickCreate.noteTitle"></label>
                <input type="text" id="qc-note-title" class="form-input form-input-full" data-i18n-placeholder="quickCreate.noteTitlePlaceholder">
                <label class="qc-label" data-i18n="quickCreate.noteTopic"></label>
                <select id="qc-note-topic" class="form-input form-input-full"></select>
                <p class="qc-hint" data-i18n="quickCreate.noteUncategorizedHint"></p>
                <button type="button" class="btn btn-primary qc-submit" id="qc-note-submit" data-i18n="quickCreate.createAndOpen"></button>
            </div>
            <div class="qc-pane" data-qc-pane="topic" hidden>
                <label class="qc-label" data-i18n="quickCreate.topicName"></label>
                <input type="text" id="qc-topic-name" class="form-input form-input-full" data-i18n-placeholder="quickCreate.topicNamePlaceholder">
                <label class="qc-label" data-i18n="quickCreate.topicParent"></label>
                <select id="qc-topic-parent" class="form-input form-input-full"></select>
                <p class="qc-hint" data-i18n="quickCreate.topicParentHint"></p>
                <button type="button" class="btn btn-primary qc-submit" id="qc-topic-submit" data-i18n="quickCreate.createTopic"></button>
            </div>
        </div>
    </div>

    <div id="custom-confirm-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100000;display:none;justify-content:center;align-items:center">
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:24px 28px;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.5)">
            <p id="custom-confirm-message" style="margin:0 0 20px 0;color:var(--text);font-size:14px;line-height:1.6;white-space:pre-wrap"></p>
            <div style="display:flex;justify-content:flex-end;gap:10px">
                <button id="custom-confirm-cancel" data-i18n="confirm.cancel" style="background:var(--bg-hover);color:var(--text-muted);border:1px solid var(--border);border-radius:6px;padding:7px 18px;cursor:pointer;font-size:13px"></button>
                <button id="custom-confirm-ok" data-i18n="confirm.ok" style="background:#4A90D9;color:#fff;border:none;border-radius:6px;padding:7px 18px;cursor:pointer;font-size:13px"></button>
            </div>
        </div>
    </div>

    <div id="frontmatter-panel" class="statusbar-frontmatter-panel" style="display: none;" hidden></div>

    <div class="app-statusbar" id="app-statusbar">
        <div class="statusbar-dock" id="statusbar-dock">
            <div class="sidebar-footer sidebar-dock-panel is-active" id="sidebar-footer-tree" data-sidebar-dock="tree">
                <button type="button" class="sidebar-footer-btn" onclick="toggleSidebar()" data-i18n-title="sidebar.collapse">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <button type="button" class="sidebar-footer-btn" id="btn-add-topic-filetree" onclick="openQuickCreate('topic')" data-i18n-title="sidebar.newTopic">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                </button>
                <button type="button" class="sidebar-footer-btn" id="btn-add-note-filetree" onclick="openQuickCreate('note')" data-i18n-title="sidebar.newNote">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                </button>
                <span class="sidebar-footer-status" id="sidebar-status-tree" data-i18n="common.notesCount" data-i18n-count="0"></span>
            </div>
            <div class="sidebar-footer sidebar-dock-panel" id="sidebar-footer-tags" data-sidebar-dock="tags" hidden>
                <button type="button" class="sidebar-footer-btn" id="btn-auto-tag" onclick="doAutoTag()" data-i18n-title="sidebar.autoTagTitle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                </button>
                <button type="button" class="sidebar-footer-btn" id="btn-add-tag" onclick="onShowAddTagInput()" data-i18n-title="sidebar.addTagTitle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <span class="sidebar-footer-status" id="sidebar-status-tags" data-i18n="common.tagsCount" data-i18n-count="0"></span>
            </div>
            <div class="sidebar-footer sidebar-dock-panel" id="sidebar-footer-graph" data-sidebar-dock="graph" hidden>
                <button type="button" class="sidebar-footer-btn" id="btn-discover-links" onclick="onDiscoverLinks()" data-i18n-title="sidebar.discoverLinksTitle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.5"></circle><circle cx="5" cy="19" r="2.5"></circle><circle cx="19" cy="19" r="2.5"></circle><line x1="12" y1="7.5" x2="5" y2="16.5"></line><line x1="12" y1="7.5" x2="19" y2="16.5"></line><line x1="7.5" y1="19" x2="16.5" y2="19"></line></svg>
                </button>
                <span class="sidebar-footer-status" id="sidebar-status-graph" data-i18n="common.linksCount" data-i18n-count="0"></span>
            </div>
        </div>
        <span class="statusbar-separator statusbar-separator-dock" aria-hidden="true"></span>
        <div class="statusbar-left">
            <span class="statusbar-item statusbar-filename" id="statusbar-filename" title="当前文件">—</span>
            <span class="statusbar-separator"></span>
            <span class="statusbar-item" id="statusbar-topic" title="主题"></span>
            <span class="statusbar-item" id="statusbar-tags" title="标签"></span>
            <button type="button" class="statusbar-item statusbar-metadata-toggle" id="statusbar-metadata-toggle" style="display: none;" hidden data-i18n="editor.metadata">元数据</button>
        </div>
        <div class="statusbar-ingest" id="ingest-pipeline-bar" role="status" aria-live="polite">
            <span class="ingest-label" id="ingest-pipeline-stage" data-i18n="ingest.label"></span>
            <div class="ingest-track"><div class="ingest-fill" id="ingest-pipeline-fill"></div></div>
            <span class="ingest-message" id="ingest-pipeline-message"></span>
            <button type="button" id="ingest-pipeline-retry" data-i18n-title="ingest.retryTitle" data-i18n="ingest.retry"></button>
            <button type="button" id="ingest-pipeline-cancel" data-i18n-title="ingest.cancelTitle" data-i18n="common.cancel"></button>
        </div>
        <div class="statusbar-right">
            <span class="statusbar-item statusbar-save-status" id="statusbar-save-status"></span>
            <span class="statusbar-item statusbar-message" id="statusbar-message"></span>
            <span class="statusbar-item" id="statusbar-chars" title="字符数">0 字符</span>
            <span class="statusbar-item" id="statusbar-words" title="词数">0 词</span>
            <span class="statusbar-item" id="statusbar-lines" title="行数">0 行</span>
            <span class="statusbar-item" id="statusbar-cursor" title="光标位置">Ln 1, Col 1</span>
        </div>
    </div>

    </div><!-- #app-scale-root -->

    <div class="drop-overlay" id="drop-overlay" style="display:none;">
      <div class="drop-overlay-content">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="8 10 12 14 16 10"/><path d="M12 14V3"/></svg>
        <p>释放即可导入文件</p>
      </div>
    </div>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>

    <div id="js-error-panel" style="position:fixed;bottom:0;left:0;right:0;max-height:40vh;overflow:auto;background:#1a0000;color:#ff6b6b;font:12px monospace;padding:10px;z-index:99999;display:none;border-top:2px solid #ff0000;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <b style="color:#ff0000">JS Errors (click to dismiss)</b>
            <button onclick="document.getElementById('js-error-panel').style.display='none'" style="background:#333;color:#fff;border:none;padding:2px 8px;cursor:pointer">X</button>
        </div>
        <pre id="js-error-log" style="margin:0;white-space:pre-wrap"></pre>
    </div>
    <script src="js/error-handler.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/G3.js"></script>
</body>
</html>
