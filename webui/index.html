<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteAI</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/tree.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/preview.css">

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>

    <script src="pdfjs-legacy.min.js"></script>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/state.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/tree.js"></script>
    <script src="js/links.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/tiptap-editor.js"></script>
    <script src="js/workspace.js"></script>
    <script src="js/downloader.js"></script>
    <script src="js/converter.js"></script>
    <script src="js/integrator.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <div class="custom-titlebar" data-tauri-drag-region>
        <div class="titlebar-left" data-tauri-drag-region>
            <button class="titlebar-btn tab-btn" onclick="switchTab(0)" data-tab="web" title="网页下载">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="8 10 12 14 16 10"></polyline>
                    <path d="M12 14V3"></path>
                </svg>
            </button>
            <button class="titlebar-btn tab-btn" onclick="importFiles()" data-tab="file" title="导入文件">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                    <line x1="12" y1="11" x2="12" y2="17"></line>
                    <polyline points="9 14 12 17 15 14"></polyline>
                </svg>
            </button>
            <button class="titlebar-btn workspace-btn" onclick="openWorkspace()" title="打开工作区">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m20 20-2-2V8l-4-4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2l2 2Z"></path>
                    <path d="M7 9h10"></path>
                    <path d="M7 13h6"></path>
                </svg>
                <span id="workspace-name-display"></span>
            </button>
            <button class="titlebar-btn tab-btn sidebar-view-btn active" data-sidebar="tree" onclick="switchSidebarView('tree')" title="目录树">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3h7v7H3z"></path>
                    <path d="M14 3h7v7h-7z"></path>
                    <path d="M14 14h7v7h-7z"></path>
                    <path d="M3 14h7v7H3z"></path>
                    <path d="M10 6.5h4"></path>
                    <path d="M10 17.5h4"></path>
                    <path d="M17.5 10v4"></path>
                    <path d="M6.5 10v4"></path>
                </svg>
            </button>
            <button class="titlebar-btn tab-btn sidebar-view-btn" data-sidebar="topic" onclick="switchSidebarView('topic')" title="主题">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <button class="titlebar-btn tab-btn sidebar-view-btn" data-sidebar="tags" onclick="switchSidebarView('tags')" title="标签">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"></path>
                    <path d="M7 7h.01"></path>
                </svg>
            </button>
            <button class="titlebar-btn tab-btn sidebar-view-btn" data-sidebar="graph" onclick="switchSidebarView('graph')" title="双向链接">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="6" r="2.5"></circle>
                    <circle cx="16" cy="18" r="2.5"></circle>
                    <path d="M10.5 6h4a2 2 0 0 1 2 2v6"></path>
                    <path d="M13.5 18h-4a2 2 0 0 1-2-2v-6"></path>
                    <polyline points="15.5 4 10.5 6 15.5 8"></polyline>
                    <polyline points="8.5 20 13.5 18 8.5 16"></polyline>
                </svg>
            </button>
        </div>
        <div class="titlebar-center" data-tauri-drag-region>
            <div class="titlebar-file-name" id="titlebar-file-name"></div>
        </div>
        <div class="titlebar-right">
            <button class="titlebar-btn" id="titlebar-split-btn" onclick="toggleEditMode()" title="编辑" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"></path>
                    <path d="m15 5 4 4"></path>
                </svg>
            </button>
            <button class="titlebar-btn titlebar-btn-close" id="titlebar-close-preview-btn" onclick="closePreviewPanel()" title="关闭预览" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                </svg>
            </button>
            <div class="titlebar-group-separator" id="titlebar-preview-separator" style="display: none;"></div>
            <button class="titlebar-btn" id="titlebar-graph-btn" onclick="toggleGraphPanel()" title="关系图谱">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="2"></circle>
                    <circle cx="4" cy="6" r="2"></circle>
                    <circle cx="20" cy="6" r="2"></circle>
                    <circle cx="4" cy="18" r="2"></circle>
                    <circle cx="20" cy="18" r="2"></circle>
                    <line x1="12" y1="10" x2="5.5" y2="7.5"></line>
                    <line x1="12" y1="10" x2="18.5" y2="7.5"></line>
                    <line x1="12" y1="14" x2="5.5" y2="16.5"></line>
                    <line x1="12" y1="14" x2="18.5" y2="16.5"></line>
                </svg>
            </button>
            <button class="titlebar-btn" id="titlebar-search-btn" onclick="toggleSearchModal()" title="搜索 (Cmd+K)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button class="titlebar-btn" onclick="showSettings()" title="设置">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43-.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
            <button class="titlebar-btn" id="titlebar-rewrite-btn" onclick="onLLMRewrite()" title="LLM 改写：用中立客观风格重写文档">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
            </button>
        </div>
    </div>
    <div class="app-container">
        <div class="sidebar sidebar-left">
            <div class="file-tree-container" id="file-tree">
                <div class="tree-empty">暂无工作区</div>
            </div>
            <div class="sidebar-view-container" id="sidebar-tags" style="display: none;"></div>
            <div class="sidebar-view-container" id="sidebar-topic" style="display: none;"></div>
            <div class="sidebar-view-container" id="sidebar-graph" style="display: none;"></div>
            <div class="sidebar-topic-input" id="sidebar-topic-input" style="display: none;">
                <input type="text" class="topic-input" id="topic-input-field" placeholder="输入主题名称...">
                <button class="topic-input-btn topic-input-cancel" id="topic-input-cancel" title="取消">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                <button class="topic-input-btn topic-input-confirm" id="topic-input-confirm" title="确认创建主题">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>
            <div class="sidebar-tag-input" id="sidebar-tag-input" style="display: none;">
                <input type="text" class="topic-input" id="tag-input-field" placeholder="输入标签名称...">
                <button class="topic-input-btn topic-input-cancel" id="tag-input-cancel" title="取消">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
                <button class="topic-input-btn topic-input-confirm" id="tag-input-confirm" title="确认创建标签">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>
            <div class="sidebar-footer" id="sidebar-footer-topic" style="display: none;">
                <button class="sidebar-footer-btn" id="btn-auto-topic" onclick="onBatchAutoAssignTopics()" title="确认主题：扫描所有未分配主题的文件">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                </button>
                <button class="sidebar-footer-btn" id="btn-add-topic" onclick="onShowTopicInput()" title="添加主题：创建新的主题分类">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
            <div class="sidebar-footer" id="sidebar-footer-tags" style="display: none;">
                <button class="sidebar-footer-btn" id="btn-auto-tag" onclick="doAutoTag()" title="自动匹配标签：扫描文件标题匹配已有标签">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                </button>
                <button class="sidebar-footer-btn" id="btn-add-tag" onclick="onShowAddTagInput()" title="新加标签：创建新的标签分类">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
            <div class="sidebar-footer" id="sidebar-footer-graph" style="display: none;">
                <button class="sidebar-footer-btn" id="btn-discover-links" onclick="onDiscoverLinks()" title="发现链接：AI 分析文章关联">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.5"></circle><circle cx="5" cy="19" r="2.5"></circle><circle cx="19" cy="19" r="2.5"></circle><line x1="12" y1="7.5" x2="5" y2="16.5"></line><line x1="12" y1="7.5" x2="19" y2="16.5"></line><line x1="7.5" y1="19" x2="16.5" y2="19"></line></svg>
                </button>
            </div>
        </div>

        <div class="resizer" id="sidebar-resizer"></div>

        <div class="right-area" id="right-area">
            <div class="content-panel" id="content-panel">
                <div class="content-area">
                    <div class="tab-content active" id="tab-0">
                    </div>

                    <div class="tab-content" id="tab-1">
                        <div class="card">
                            <div class="card-title">笔记整合</div>
                            <div class="ai-status-box">
                                <span class="status-dot"></span>
                                <span class="status-text">从Notes文件夹读取markdown文件，整合输出到Organized文件夹</span>
                            </div>
                        </div>

                        <div class="card" id="topic-card">
                            <div class="card-title">主题设置</div>
                            <div class="form-group" style="display: flex; gap: 12px; align-items: flex-end;">
                                <div style="flex: 1;">
                                    <div class="form-label">主题个数（留空则自动选择）</div>
                                    <input type="number" id="topic-count" class="form-input" placeholder="例如：5" min="2" style="width: 100%;">
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="form-label">点击提取主题，或手动输入（每行一个）</div>
                                <textarea id="topic-list" class="form-input form-textarea" placeholder="主题1&#10;主题2&#10;主题3" oninput="updateIntegrateBtnState()"></textarea>
                            </div>
                            <div class="btn-group" style="margin-top: 8px;">
                                <button class="btn btn-secondary" id="extract-topics-btn" onclick="extractTopics()" style="flex: 1;" title="提取主题：从网页内容中提取关键主题">提取主题</button>
                                <button class="btn btn-primary" id="integrate-btn" onclick="startNoteIntegration()" style="flex: 1;" disabled title="开始整合：将内容整合到笔记中">开始整合</button>
                            </div>
                        </div>

                        <div class="integration-hint" id="integration-hint"></div>

                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" id="integration-progress-fill"></div>
                            </div>
                            <div class="progress-text" id="integration-status"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="topic-pending-panel" id="topic-pending-panel" style="display: none;"></div>

            <div class="graph-panel" id="graph-panel" style="display: none;">
                <div class="graph-panel-header">
                    <div class="graph-filter-bar">
                        <button class="graph-filter-btn active" data-gfilter="all" onclick="onGraphFilter('all')" title="显示全部关系">全部</button>
                        <button class="graph-filter-btn" data-gfilter="topic" onclick="onGraphFilter('topic')" title="只显示主题关系">主题</button>
                        <button class="graph-filter-btn" data-gfilter="tag" onclick="onGraphFilter('tag')" title="只显示标签关系">标签</button>
                        <button class="graph-filter-btn" data-gfilter="link" onclick="onGraphFilter('link')" title="只显示双向链接关系">链接</button>
                    </div>
                    <button class="graph-panel-close" onclick="toggleGraphPanel()" title="关闭图谱">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="graph-panel-body" id="graph-panel-body">
                    <div class="graph-loading" id="graph-loading" style="display:none;">加载中...</div>
                    <div class="graph-empty" id="graph-empty" style="display:none;">暂无数据</div>
                    <canvas id="graph-canvas" style="display:none;"></canvas>
                </div>
                <div class="graph-panel-footer">
                    <div class="graph-legend">
                        <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#4A90D9"></span>文件</span>
                        <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#E8913A"></span>主题</span>
                        <span class="graph-legend-item"><span class="graph-legend-dot" style="background:#50B87F"></span>标签</span>
                    </div>
                    <div class="graph-toolbar">
                        <button class="graph-toolbar-btn" onclick="graphZoomIn()" title="放大">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        </button>
                        <button class="graph-toolbar-btn" onclick="graphZoomOut()" title="缩小">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        </button>
                        <button class="graph-toolbar-btn" id="graph-evolve-btn" onclick="graphToggleEvolve()" title="演变：重新启动力模拟动画">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        </button>
                        <button class="graph-toolbar-btn" onclick="loadRelationGraphData()" title="刷新图谱">
                            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        </button>
                    </div>
                </div>
                <div class="graph-tooltip" id="graph-tooltip" style="display:none;"></div>
            </div>

            <div class="pending-links-panel" id="pending-links-panel" style="display: none;">
                <div class="pending-links-header">
                    <span class="pending-links-title">待确认链接</span>
                    <button class="pending-links-confirm-all" onclick="onConfirmAllLinks()" title="一键确认所有待确认链接">全部确认</button>
                    <button class="graph-panel-close" onclick="togglePendingLinksPanel()" title="关闭">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="pending-links-body" id="pending-links-body">
                    <div class="pending-links-empty" id="pending-links-empty">暂无待确认链接</div>
                    <div class="pending-links-list" id="pending-links-list"></div>
                </div>
            </div>

            <div class="preview-panel" id="preview-panel" style="display: none;">
                <div class="preview-resizer" id="preview-resizer"></div>
                <div class="preview-content-wrapper">
                    <div class="preview-content" id="preview-content">
                        <div class="preview-empty" id="preview-empty">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            <div>选择文件以预览</div>
                        </div>
                    </div>

                    <div class="tiptap-editor-container" id="tiptap-editor-container" style="display: none;">
                        <div class="tiptap-toolbar" id="tiptap-toolbar" style="display: none;">
                            <button class="tiptap-btn" data-action="bold" title="加粗">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                                    <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
                                </svg>
                            </button>
                            <button class="tiptap-btn" data-action="italic" title="斜体">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="19" y1="4" x2="10" y2="4"></line>
                                    <line x1="14" y1="20" x2="5" y2="20"></line>
                                    <line x1="15" y1="4" x2="9" y2="20"></line>
                                </svg>
                            </button>
                            <button class="tiptap-btn" data-action="strike" title="删除线">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M17.3 4.9c-1.2-.9-2.8-1.4-4.8-1.4-3.1 0-5.5.8-7.1 2.3-1.6 1.6-2.4 3.6-2.4 6.2s.8 4.6 2.4 6.2c1.6 1.6 4 2.3 7.1 2.3 2.7 0 4.6-.7 6-2.1.7-.7 1.2-1.6 1.4-2.7.2-1 .1-2-.1-2.8h-8"></path>
                                </svg>
                            </button>
                            <button class="tiptap-btn" data-action="code" title="行内代码">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="16 18 22 12 16 6"></polyline>
                                    <polyline points="8 6 2 12 8 18"></polyline>
                                </svg>
                            </button>
                            <div class="tiptap-separator"></div>
                            <button class="tiptap-btn" data-action="heading" data-level="1" title="标题 1">H1</button>
                            <button class="tiptap-btn" data-action="heading" data-level="2" title="标题 2">H2</button>
                            <button class="tiptap-btn" data-action="heading" data-level="3" title="标题 3">H3</button>
                            <div class="tiptap-separator"></div>
                            <button class="tiptap-btn" data-action="bulletList" title="无序列表">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="8" y1="6" x2="21" y2="6"></line>
                                    <line x1="8" y1="12" x2="21" y2="12"></line>
                                    <line x1="8" y1="18" x2="21" y2="18"></line>
                                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                </svg>
                            </button>
                            <button class="tiptap-btn" data-action="orderedList" title="有序列表">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="10" y1="6" x2="21" y2="6"></line>
                                    <line x1="10" y1="12" x2="21" y2="12"></line>
                                    <line x1="10" y1="18" x2="21" y2="18"></line>
                                    <path d="M4 6h2"></path>
                                    <path d="M4 10h4"></path>
                                    <path d="M5 10v6"></path>
                                    <path d="M4 16h4"></path>
                                </svg>
                            </button>
                            <button class="tiptap-btn" data-action="taskList" title="任务列表">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 11l3 3L22 4"></path>
                                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                                </svg>
                            </button>
                            <div class="tiptap-separator"></div>
                            <button class="tiptap-btn" data-action="blockquote" title="引用">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972zM14 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972z"></path>
                                </svg>
                            </button>
                            <button class="tiptap-btn" data-action="codeBlock" title="代码块">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="16 18 22 12 16 6"></polyline>
                                    <polyline points="8 6 2 12 8 18"></polyline>
                                </svg>
                            </button>
                            <button class="tiptap-btn" data-action="link" title="链接">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                                </svg>
                            </button>
                            <button class="tiptap-btn" data-action="image" title="图片">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                            </button>
                            <div class="tiptap-separator"></div>
                            <button class="tiptap-btn" data-action="undo" title="撤销">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 7v6h6"></path>
                                    <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                                </svg>
                            </button>
                            <button class="tiptap-btn" data-action="redo" title="重做">
                                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 7v6h-6"></path>
                                    <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path>
                                </svg>
                            </button>
                        </div>
                        <div class="tiptap-editor-content" id="tiptap-editor"></div>
                        <div id="frontmatter-panel" style="display: none;"></div>
                    </div>

                    <div class="preview-info" id="preview-info" style="display: none;">
                        <span id="preview-file-size"></span>
                        <span id="preview-file-type"></span>
                    </div>
                </div>
            </div>

        </div>

        <div class="about-panel-overlay" id="settings-panel">
            <button class="about-panel-close" onclick="closeSettingsPanel()" title="关闭">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6 6 18"></path>
                    <path d="m6 6 12 12"></path>
                </svg>
            </button>
            <div class="about-panel" id="settings-panel-content">
                <h2>设置</h2>
                <div class="card theme-card">
                    <div class="card-title">主题设置</div>
                    <div class="theme-options">
                        <label class="theme-option">
                            <input type="radio" name="theme-popup" value="light" onchange="setTheme('light')">
                            <div class="theme-preview light-preview">
                                <div class="theme-preview-header"></div>
                                <div class="theme-preview-content"></div>
                            </div>
                            <span>浅色</span>
                        </label>
                        <label class="theme-option">
                            <input type="radio" name="theme-popup" value="dark" onchange="setTheme('dark')">
                            <div class="theme-preview dark-preview">
                                <div class="theme-preview-header"></div>
                                <div class="theme-preview-content"></div>
                            </div>
                            <span>深色</span>
                        </label>
                        <label class="theme-option">
                            <input type="radio" name="theme-popup" value="system" onchange="setTheme('system')">
                            <div class="theme-preview system-preview">
                                <div class="theme-preview-header"></div>
                                <div class="theme-preview-content"></div>
                            </div>
                            <span>跟随系统</span>
                        </label>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">LLM API 配置</div>
                    <div class="form-group">
                        <div class="form-label">API Key</div>
                        <input type="password" id="api-key" class="form-input" placeholder="">
                    </div>
                    <div class="form-group">
                        <div class="form-label">API Base</div>
                        <input type="text" id="api-base" class="form-input" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="form-group">
                        <div class="form-label">模型</div>
                        <input type="text" id="model-name" class="form-input" placeholder="gpt-4">
                    </div>
                    <div class="form-group">
                        <div class="form-label">Temperature</div>
                        <input type="number" id="temperature" class="form-input" style="width: 120px;" step="0.1" min="0" max="2" value="0.7">
                    </div>
                    <div class="form-group">
                        <div class="form-label">最大输出 Tokens</div>
                        <input type="number" id="max-tokens" class="form-input" style="width: 120px;" min="100" max="128000" value="32000">
                    </div>
                    <div class="form-group">
                        <div class="form-label">全局最大上下文</div>
                        <input type="number" id="max-context" class="form-input" style="width: 120px;" min="1000" max="1000000" value="128000">
                    </div>
                    <button class="btn btn-primary" onclick="saveApiConfig()">保存配置</button>
                    <div id="api-config-status-popup" class="settings-hint" style="margin-top: 8px; display: none;"></div>
                </div>
            </div>
        </div>

        <div class="search-modal-overlay" id="search-modal" style="display: none;">
            <div class="search-modal">
                <div class="search-input-row">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" class="search-input-icon">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="search-input" id="search-input" placeholder="搜索笔记..." autocomplete="off">
                    <kbd class="search-hint" id="search-hint">ESC</kbd>
                </div>
                <div class="search-results" id="search-results">
                    <div class="search-empty">输入关键词搜索工作区中的所有笔记</div>
                </div>
            </div>
        </div>

        <div class="download-modal-overlay" id="download-modal">
            <div class="download-modal" id="download-modal-content">
                <div class="download-modal-header" id="download-modal-header">
                    <div class="download-modal-title">下载</div>
                    <button class="download-modal-close" onclick="closeDownloadModal()" title="关闭">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18"></path>
                            <path d="m6 6 12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="download-modal-body">
                    <textarea id="modal-urls" class="form-input form-textarea modal-url-textarea" placeholder=""></textarea>
                    <div class="url-hint-text">输入网址，每行一个</div>
                    <div class="modal-progress-container" id="modal-progress-container" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="modal-web-progress-fill"></div>
                        </div>
                        <div class="progress-text" id="modal-web-status"></div>
                    </div>
                </div>
                <div class="download-modal-footer">
                    <label class="switch-container">
                        <input type="checkbox" id="modal-web-include-images" class="switch-input">
                        <span class="switch-slider"></span>
                    </label>
                    <span class="switch-label">包含图片的外部 URL 链接</span>
                    <button class="btn btn-primary" id="modal-download-btn" onclick="startDownloadFromModal()">开始下载</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
